name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Write Mapbox config from secret
        env:
          MAPBOX_PUBLIC_TOKEN: ${{ secrets.MAPBOX_PUBLIC_TOKEN }}
        run: |
          if [ -z "$MAPBOX_PUBLIC_TOKEN" ]; then
            echo "::warning::MAPBOX_PUBLIC_TOKEN not set — embedded map will show a setup message"
            echo "window.MAPBOX_TOKEN = '';" > js/map-config.js
          else
            printf 'window.MAPBOX_TOKEN = %s;\n' "$(jq -Rn --arg t "$MAPBOX_PUBLIC_TOKEN" '$t')" > js/map-config.js
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
